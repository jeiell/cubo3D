<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MN 3D Viewer - Cinematic Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%); background-size: cover; background-position: center; transition: background 1s cubic-bezier(0.4, 0, 0.2, 1); }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.2s; }
        #app-name { color: #fff; font-size: 24px; font-weight: 100; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 25px; }
        .progress-container { width: 200px; height: 1px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #fff; transition: width 2.5s ease; }
        #signature { margin-top: 25px; color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; }
        #info-header { position: absolute; top: 35px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); letter-spacing: 5px; text-transform: uppercase; font-size: 9px; pointer-events: none; z-index: 10; }
        .trigger-btn { position: absolute; left: 25px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.4s; color: rgba(255,255,255,0.4); z-index: 20; outline: none; -webkit-tap-highlight-color: transparent; }
        #env-trigger { bottom: 330px; } #mod-trigger { bottom: 270px; } #mat-trigger { bottom: 210px; } #adj-trigger { bottom: 150px; } #hdr-trigger { bottom: 90px; } #photo-trigger { bottom: 30px; }
        .active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
        .panel { position: absolute; left: 95px; bottom: 30px; width: 250px; background: rgba(10, 10, 10, 0.2); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.06); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 15; opacity: 0; pointer-events: none; transform: translateX(-20px); padding: 15px; }
        .panel.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
        .menu-item { margin-bottom: 8px; border-radius: 18px; overflow: hidden; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); }
        .menu-header { padding: 16px 20px; color: rgba(255,255,255,0.5); font-size: 9px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .menu-header.active { color: #fff; background: rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.6s; background: rgba(0,0,0,0.2); padding: 0 20px; }
        .menu-content.show { max-height: 380px; padding: 20px 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { padding: 14px; background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); font-size: 9px; text-transform: uppercase; border-radius: 12px; cursor: pointer; text-align: center; }
        label { color: rgba(255,255,255,0.3); font-size: 8px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; margin-top: 10px; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.08); margin-bottom: 25px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; }
        #hue-slider { background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); height: 3px; }
    </style>
</head>
<body>
    <div id="splash-screen"><div id="app-name">MN 3D Viewer</div><div class="progress-container"><div class="progress-bar" id="bar"></div></div><div id="signature">Feito por Natanael Teixeira</div></div>
    <div id="info-header">TOQUE: ROTACIONAR • PINÇA: ZOOM</div>
    <div id="three-container"></div>
    <div id="ui-controls">
        <div id="env-trigger" class="trigger-btn" onclick="toggleBackground()"><i class="fa-solid fa-mountain-sun"></i></div>
        <div id="mod-trigger" class="trigger-btn" onclick="toggleMainPanel('panel-mod')"><i class="fa-solid fa-shapes"></i></div>
        <div id="mat-trigger" class="trigger-btn" onclick="toggleMainPanel('panel-mat')"><i class="fa-solid fa-layer-group"></i></div>
        <div id="adj-trigger" class="trigger-btn" onclick="toggleMainPanel('panel-adj')"><i class="fa-solid fa-sliders"></i></div>
        <div id="hdr-trigger" class="trigger-btn active" onclick="toggleHDR()"><i class="fa-solid fa-sun"></i></div>
        <div id="photo-trigger" class="trigger-btn" onclick="takeSnapshot()"><i class="fa-solid fa-camera"></i></div>
        
        <div id="panel-mod" class="panel"><div class="menu-item"><div class="menu-header active" onclick="toggleAccordion(this)">Modelos 3D <i class="fa-solid fa-chevron-down"></i></div><div class="menu-content show"><div class="grid"><div class="opt-btn" onclick="changeMesh('cube')">Cubo</div><div class="opt-btn" onclick="changeMesh('sphere')">Esfera</div><div class="opt-btn" onclick="changeMesh('torus')">Toro</div><div class="opt-btn" onclick="changeMesh('cylinder')">Cilindro</div></div></div></div></div>
        <div id="panel-mat" class="panel"><div class="menu-item"><div class="menu-header active" onclick="toggleAccordion(this)">Superfícies <i class="fa-solid fa-chevron-down"></i></div><div class="menu-content show"><div class="grid"><div class="opt-btn" onclick="applyTexture('concrete')">Piso</div><div class="opt-btn" onclick="applyTexture('marble')">Mármore</div><div class="opt-btn" onclick="applyTexture('wood')">Madeira</div><div class="opt-btn" onclick="applyTexture('none')">Natural</div></div></div></div></div>
        <div id="panel-adj" class="panel"><div class="menu-item"><div class="menu-header" onclick="toggleAccordion(this)">Cores Profissionais <i class="fa-solid fa-chevron-down"></i></div><div class="menu-content"><label>Matiz</label><input type="range" id="hue-slider" min="0" max="360" value="210"><label>Saturação</label><input type="range" id="sat-slider" min="0" max="100" value="15"><label>Luz</label><input type="range" id="light-slider" min="0" max="100" value="80"></div></div><div class="menu-item"><div class="menu-header" onclick="toggleAccordion(this)">Reflexos <i class="fa-solid fa-chevron-down"></i></div><div class="menu-content"><label>Rugosidade</label><input type="range" id="rough-slider" min="0" max="100" value="10"><label>Verniz</label><input type="range" id="coat-slider" min="0" max="100" value="100"></div></div></div>
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';
        import { RGBELoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/RGBELoader.js';

        let isIntroFinished = false;
        let currentH = 210, currentS = 15, currentL = 80;
        let studioHDR, pavilionHDR; 
        let showEnvBackground = false;
        let rotationTimeout;

        const haptic = () => { if(navigator.vibrate) navigator.vibrate(8); };

        window.onload = () => {
            const bar = document.getElementById('bar');
            setTimeout(() => { bar.style.width = "100%"; }, 100);
            setTimeout(() => { 
                document.getElementById('splash-screen').style.opacity = "0";
                setTimeout(() => { document.getElementById('splash-screen').style.display = "none"; isIntroFinished = true; }, 1200);
            }, 3000); 
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.getElementById('three-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 4.0;
        controls.target.set(0, 0, 0); // Trava o olhar da câmera no centro absoluto

        // LÓGICA DE PARADA E RETORNO (5 SEGUNDOS)
        const stopRotation = () => {
            controls.autoRotate = false;
            clearTimeout(rotationTimeout);
        };

        const startRotationTimer = () => {
            rotationTimeout = setTimeout(() => {
                controls.autoRotate = true;
            }, 5000);
        };

        renderer.domElement.addEventListener('pointerdown', stopRotation);
        renderer.domElement.addEventListener('pointerup', startRotationTimer);

        const material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.9, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.03 });

        let currentMesh = new THREE.Mesh(new THREE.TorusGeometry(1, 0.4, 32, 100), material);
        currentMesh.geometry.center(); // Alinha o pivô no centro exato da geometria
        scene.add(currentMesh);

        const rgbeLoader = new RGBELoader();
        rgbeLoader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_03_1k.hdr', (t) => {
            t.mapping = THREE.EquirectangularReflectionMapping; studioHDR = t; scene.environment = studioHDR;
        });
        rgbeLoader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/industrial_sunset_puresky_1k.hdr', (t) => {
            t.mapping = THREE.EquirectangularReflectionMapping; pavilionHDR = t;
        });

        window.toggleMainPanel = (id) => {
            haptic(); document.querySelectorAll('.panel').forEach(p => p.id === id ? p.classList.toggle('open') : p.classList.remove('open'));
            document.querySelectorAll('.trigger-btn').forEach(b => b.id === id+'-trigger' ? b.classList.toggle('active') : (!['hdr-trigger', 'env-trigger'].includes(b.id) && b.classList.remove('active')));
        };

        window.toggleAccordion = (header) => { haptic(); header.classList.toggle('active'); header.nextElementSibling.classList.toggle('show'); };

        window.changeMesh = (type) => {
            haptic(); 
            const targetGeo = type === 'sphere' ? new THREE.SphereGeometry(1.3, 64, 64) : 
                            type === 'torus' ? new THREE.TorusGeometry(1, 0.4, 32, 100) : 
                            type === 'cylinder' ? new THREE.CylinderGeometry(1, 1, 2, 32) : 
                            new THREE.BoxGeometry(2, 2, 2);
            
            targetGeo.center(); // CORREÇÃO DO ARCOPOINT: Alinha o centro da nova geometria

            let s = 1.0; 
            const interval = setInterval(() => { 
                s -= 0.18; 
                currentMesh.scale.set(s, s, s); 
                if(s <= 0) { 
                    clearInterval(interval); 
                    currentMesh.geometry.dispose(); 
                    currentMesh.geometry = targetGeo; 
                    const grow = setInterval(() => { 
                        s += 0.18; 
                        currentMesh.scale.set(s, s, s); 
                        if(s >= 1) { currentMesh.scale.set(1, 1, 1); clearInterval(grow); } 
                    }, 16); 
                } 
            }, 16);
        };

        window.applyTexture = (type) => {
            haptic(); const loader = new THREE.TextureLoader();
            if(type === 'none') material.map = null;
            else { const url = type === 'marble' ? 'https://threejs.org/examples/textures/waterdudv.jpg' : type === 'concrete' ? 'https://threejs.org/examples/textures/floors/FloorsCheckerboard_S_Diffuse.jpg' : 'https://threejs.org/examples/textures/hardwood2_diffuse.jpg'; material.map = loader.load(url); }
            material.needsUpdate = true;
        };

        window.toggleBackground = () => {
            haptic(); showEnvBackground = !showEnvBackground; const container = document.getElementById('three-container');
            if (showEnvBackground) {
                container.style.backgroundImage = "url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop')";
                scene.environment = pavilionHDR; renderer.toneMappingExposure = 1.5; document.getElementById('env-trigger').classList.add('active');
            } else {
                container.style.backgroundImage = "radial-gradient(circle at center, #2c2c2c 0%, #000000 100%)";
                scene.environment = studioHDR; renderer.toneMappingExposure = 1.3; document.getElementById('env-trigger').classList.remove('active');
            }
        };

        window.toggleHDR = () => { haptic(); scene.environment = scene.environment ? null : (showEnvBackground ? pavilionHDR : studioHDR); document.getElementById('hdr-trigger').classList.toggle('active'); };

        const updateColor = () => material.color.setHSL(currentH / 360, currentS / 100, currentL / 100);
        document.getElementById('hue-slider').oninput = (e) => { currentH = e.target.value; updateColor(); };
        document.getElementById('sat-slider').oninput = (e) => { currentS = e.target.value; updateColor(); };
        document.getElementById('light-slider').oninput = (e) => { currentL = e.target.value; updateColor(); };
        document.getElementById('rough-slider').oninput = (e) => material.roughness = e.target.value / 100;
        document.getElementById('coat-slider').oninput = (e) => material.clearcoat = e.target.value / 100;

        window.takeSnapshot = () => { haptic(); const link = document.createElement('a'); link.download = `MN_Capture_${Date.now()}.png`; link.href = renderer.domElement.toDataURL('image/png'); link.click(); };

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
